# DISCLAIMER !!!
# These keybinds are meant to work with
# my split keyboard in mind, so some
# binds might seem unintuitive.

# I also still change keys & binds,
# so take that into consideration.

# ZSA Moonlander config:
# https://configure.zsa.io/moonlander/layouts/0N5XK/eaLyEl/0

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct   # for Qt6



########################################
### MONITORS, WINDOWS AND WORKSPACES ###
########################################

# 1) Laptop  16:10 1440p Bottom, Landscape secondary 456
# 2) LG      16:9  1440p Top,    Landscape PRIMARY   123
# 3) Iiyama  9:16  1080p Right,  Portrait  tertiary  789
monitor = eDP-1, 2560x1600@165, 0x1440, 1.25, bitdepth, 10
workspace = 1, monitor:eDP-1
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1

monitor = HDMI-A-1, 2560x1440@144, 0x0, 1, bitdepth, 10
workspace = 4, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1
workspace = 6, monitor:HDMI-A-1

# The position 2560x1 '1', is to make sure not the monitor, but HDMI-A-1 gets chosen as main monitor
monitor = DP-2, 1920x1080@60, 2560x1, 1, transform, 3, bitdepth, 10
workspace = 7, monitor:DP-2
workspace = 8, monitor:DP-2
workspace = 9, monitor:DP-2



#################
### AUTOSTART ###
#################

# Start GUI apps on boot
exec-once = [workspace 1 silent] anki

# GTK3 & GTK4 dark theme preference respectively
exec = gsettings set org.gnome.desktop.interface gtk-theme "Adwaita-dark"
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"

exec-once = kwalletd6
exec-once = waybar & hyprpaper & hypridle & hyprshot & hyprsunset
exec-once = swaync
exec-once = wl-paste --watch cliphist store



###################
### KEYBINDINGS ###
###################

$mainMod = SUPER # Sets "Windows" key as main modifier

#----------------------#
# Toprow | Common apps #
#----------------------#
bind = $mainMod, Q, exec, kitty
bind = $mainMod, W, exec, brave
bind = $mainMod, E, exec, dolphin
bind = $mainMod, R, exec, anki
bind = $mainMod, T, exec, obsidian
bind = $mainMod, Y, exec, spotify


#------------------------------------------------#
# Middlerow | Common apps, Window behavior & STT #
#------------------------------------------------#
bind = $mainMod, A, exec,
bind = $mainMod, S, exec,
bind = $mainMod, D, exec,

bind = $mainMod, F, togglefloating
bind = $mainMod, G, pseudo # dwindle, float in center

bindl = $mainMod, H, exec, arecord -f cd -t wav /tmp/stt_recording.wav # Held, Speach recording
bindr = $mainMod, H, exec, bash ~/.config/hypr/scripts/stt.sh # Release, Whisper STT & Clipboard Paste (Speach-to-Text)


#-------------------------#
# Bottomrow | OS behavior #
#-------------------------#
bind = $mainMod, Z, exec,
bind = $mainMod, X, exec,

bind = $mainMod, C, killactive
bind = $mainMod SHIFT, C, exec, hyprpicker -a

bind = $mainMod, V, exec, cliphist list | rofi -dmenu -display-columns 2 | cliphist decode | wl-copy # Show clipboard
bind = $mainMod SHIFT, V, exec, cliphist wipe # Wipe clipboard

bind = $mainMod, B, exec, pkill -USR1 waybar
bind = $mainMod SHIFT, B, exec, /home/sv/dotfiles/waybar/.config/waybar/launch.sh; pkill hyprpaper; sleep 0.5; hyprpaper & # Reload waybar & hyprpaper

bind = $mainMod, N, exec, rofi -show emoji -modi emoji


#------------------------------------------------------#
# Rightside, Numberrow, Righkeys & Numpad | Workspaces #
#------------------------------------------------------#
bind = $mainMod, 1, workspace, 1
bind = $mainMod, M, workspace, 1
bind = $mainMod, code:87, workspace, 1
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, M, movetoworkspace, 1
bind = $mainMod SHIFT, code:87, movetoworkspace, 1

bind = $mainMod, 2, workspace, 2
bind = $mainMod, COMMA, workspace, 2
bind = $mainMod, code:88, workspace, 2
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, COMMA, movetoworkspace, 2
bind = $mainMod SHIFT, code:88, movetoworkspace, 2

bind = $mainMod, 3, workspace, 3
bind = $mainMod, PERIOD, workspace, 3
bind = $mainMod, code:89, workspace, 3
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, PERIOD, movetoworkspace, 3
bind = $mainMod SHIFT, code:89, movetoworkspace, 3

bind = $mainMod, 4, workspace, 4
bind = $mainMod, J, workspace, 4
bind = $mainMod, code:83, workspace, 4
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, J, movetoworkspace, 4
bind = $mainMod SHIFT, code:83, movetoworkspace, 4

bind = $mainMod, 5, workspace, 5
bind = $mainMod, K, workspace, 5
bind = $mainMod, code:84, workspace, 5
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, K, movetoworkspace, 5
bind = $mainMod SHIFT, code:84, movetoworkspace, 5

bind = $mainMod, 6, workspace, 6
bind = $mainMod, L, workspace, 6
bind = $mainMod, code:85, workspace, 6
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, L, movetoworkspace, 6
bind = $mainMod SHIFT, code:85, movetoworkspace, 6

bind = $mainMod, 7, workspace, 7
bind = $mainMod, U, workspace, 7
bind = $mainMod, code:79, workspace, 7
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, U, movetoworkspace, 7
bind = $mainMod SHIFT, code:79, movetoworkspace, 7

bind = $mainMod, 8, workspace, 8
bind = $mainMod, I, workspace, 8
bind = $mainMod, code:80, workspace, 8
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, I, movetoworkspace, 8
bind = $mainMod SHIFT, code:80, movetoworkspace, 8

bind = $mainMod, 9, workspace, 9
bind = $mainMod, O, workspace, 9
bind = $mainMod, code:81, workspace, 9
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, O, movetoworkspace, 9
bind = $mainMod SHIFT, code:81, movetoworkspace, 9


#------------------------------#
# Rightmost | Common documents #
#------------------------------#

bind = $mainMod, P, exec, okular /home/sv/documents/reading/lpic-1.pdf
bind = $mainMod, EQUAL, exec, okular -p 634  /home/sv/documents/reading/lpic-1.pdf

bind = $mainMod, SEMICOLON, exec,
bind = $mainMod, APOSTROPHE, exec,

bind = $mainMod, SLASH, exec,
bind = $mainMod, BACKSLASH, exec, libreoffice /home/sv/documents/reading/jb-refererencecard.odg


#---------#
# Special #
#---------#
bind = $mainMod, ESCAPE, exec, hyprlock
bind = $mainMod, SUPER_L, exec, rofi -show drun -show-icons
bind = $mainMod, SPACE, exec, /home/sv/dotfiles/hypr/.config/hypr/scripts/pinnedMenu.sh

bind = , PRINT, exec, hyprshot -m output -o ~/images/screenshots/$(date +%Y-%m) # Screenshot screen
bind = SHIFT, PRINT, exec, hyprshot -m region -o ~/images/screenshots/$(date +%Y-%m) # Screenshots region
bind = CTRL, PRINT, exec, hyprshot -m window -o ~/images/screenshots/$(date +%Y-%m)# # Screenshots window

# Move focus
bind = $mainMod, LEFT, movefocus, l
bind = $mainMod, RIGHT, movefocus, r
bind = $mainMod, UP, movefocus, u
bind = $mainMod, DOWN, movefocus, d

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 2%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous



#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

device {
    name = wacom-intuos-s-pen
    output = current
    transform = 0
}



#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 1

    col.active_border = rgb(888888) # Lightgrey
    #col.active_border = rgb(FFAA00) # Blender orange

    #col.inactive_border = rgb(3A3A3A) # Grey
    col.inactive_border = rgb(181818) # Darkgrey
    layout = dwindle
}

decoration {
    rounding = 0
    rounding_power = 2

    blur {
        enabled = true
        size = 2
        passes = 1

        vibrancy = 0.1696
    }
}

# CUSTOM Apply rounding to solo windows, be it: fullscreen, floating or pseudo
windowrule = border_size 1, rounding 12, match:workspace w[1]
windowrule = border_size 1, rounding 12, match:workspace f[1]

dwindle {
    preserve_split = true
}

animations {
    enabled = yes

    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     20,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}



###########################
### CUSTOM APP BEHAVIOR ###
###########################

xwayland {
  # Force x11-to-Wayland apps to render without rescaling (laptop 1.25x)
  force_zero_scaling = true
}

# Ignore maximize requests from apps.
windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# Jetbrains IDE's | Snapping issue: https://github.com/hyprwm/Hyprland/issues/4257#issuecomment-2759517981
# fix tooltips & tab dragging
windowrule = no_initial_focus on, no_focus on, match:class ^(.*jetbrains.*)$, match:title ^(win.*)$
windowrule = no_initial_focus on, no_focus on, match:class ^(.*jetbrains.*)$, match:title ^\\s$

# Affinity (wine) | Window creation issue
# fix tooltips & tab dragging
windowrule = no_initial_focus on, no_focus on, match:class ^(.*affinity\.exe.*)$, match:title ^(win.*)$
windowrule = no_initial_focus on, no_focus on, match:class ^(.*affinity\.exe.*)$, match:title ^\\s$

# See through image application to trace them
#windowrule = float on, opacity 0.5 1, match:class org.nomacs.ImageLounge
#windowrule = float on, opacity 0.5 1, match:class gimp
